<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workout Tracker</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  padding: 16px;
}

h1 { text-align: center; }

.card, .exercise {
  background: #020617;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 16px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  border: none;
  background: #020617;
  color: #e5e7eb;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  margin-top: 6px;
}

.green { background: #22c55e; color: #020617; }
.blue { background: #38bdf8; color: #020617; }
.gray { background: #64748b; color: #020617; }

.progress-bar {
  height: 10px;
  background: #1e293b;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 6px;
}

.progress {
  height: 100%;
  background: #22c55e;
}

.row {
  display: flex;
  gap: 6px;
}

.set-log {
  font-size: 0.85rem;
  opacity: 0.85;
}
</style>
</head>

<body>

<h1>Workout Tracker</h1>

<div class="card">
  <h3>Add Exercise</h3>
  <input id="name" placeholder="Exercise name" />
  <input id="startWeight" type="number" placeholder="Start weight" />
  <input id="goalWeight" type="number" placeholder="Goal weight" />
  <input id="currentWeight" type="number" placeholder="Current weight" />
  <input id="reps" type="number" placeholder="Reps per set" />
  <input id="repMin" type="number" placeholder="Rep range min" />
  <input id="repMax" type="number" placeholder="Rep range max" />
  <input id="increment" type="number" placeholder="Weight increment" />
  <button class="green" onclick="addExercise()">Add Exercise</button>
</div>

<div id="exercises"></div>

<script>
// ===== DOM REFERENCES (FIXED) =====
const exercisesDiv = document.getElementById("exercises");

const nameInput = document.getElementById("name");
const startWeightInput = document.getElementById("startWeight");
const goalWeightInput = document.getElementById("goalWeight");
const currentWeightInput = document.getElementById("currentWeight");
const repsInput = document.getElementById("reps");
const repMinInput = document.getElementById("repMin");
const repMaxInput = document.getElementById("repMax");
const incrementInput = document.getElementById("increment");

// ===== STATE =====
let exercises = JSON.parse(localStorage.getItem("exercises")) || [];

// ===== HELPERS =====
function save() {
  localStorage.setItem("exercises", JSON.stringify(exercises));
  render();
}

function progressPercent(ex) {
  const effectiveWeight =
    ex.currentWeight +
    Math.max(0, ex.reps - ex.repMin) * ex.increment;

  return Math.min(
    100,
    Math.max(
      0,
      ((effectiveWeight - ex.startWeight) /
        (ex.goalWeight - ex.startWeight)) * 100
    )
  );
}

// ===== ACTIONS =====
function addExercise() {
  if (!nameInput.value) return;

  exercises.push({
    name: nameInput.value,
    startWeight: +startWeightInput.value,
    goalWeight: +goalWeightInput.value,
    currentWeight: +currentWeightInput.value,
    reps: +repsInput.value,
    repMin: +repMinInput.value,
    repMax: +repMaxInput.value,
    increment: +incrementInput.value,
    sets: []
  });

  nameInput.value = "";
  save();
}

function incRep(i) {
  exercises[i].reps++;
  save();
}

function incWeight(i) {
  exercises[i].currentWeight += exercises[i].increment;
  save();
}

function logSet(i) {
  exercises[i].sets.unshift({
    weight: exercises[i].currentWeight,
    reps: exercises[i].reps,
    time: new Date().toLocaleTimeString()
  });
  save();
}

function move(i, dir) {
  const target = i + dir;
  if (target < 0 || target >= exercises.length) return;
  [exercises[i], exercises[target]] = [exercises[target], exercises[i]];
  save();
}

// ===== RENDER =====
function render() {
  exercisesDiv.innerHTML = "";

  exercises.forEach((ex, i) => {
    const pct = progressPercent(ex).toFixed(1);

    exercisesDiv.innerHTML += `
      <div class="exercise">
        <div class="row">
          <button class="gray" onclick="move(${i},-1)">↑</button>
          <button class="gray" onclick="move(${i},1)">↓</button>
        </div>

        <h3>${ex.name}</h3>

        <div class="progress-bar">
          <div class="progress" style="width:${pct}%"></div>
        </div>
        <p>${pct}% to goal (${ex.goalWeight} @ ${ex.repMax} reps)</p>
        <p>Current: ${ex.currentWeight} × ${ex.reps}</p>

        <div class="row">
          <button class="blue" onclick="incRep(${i})">+1 Rep</button>
          <button class="blue" onclick="incWeight(${i})">+${ex.increment} Wt</button>
        </div>

        <button class="green" onclick="logSet(${i})">Log Set</button>

        ${ex.sets.slice(0,5).map(
          s => `<div class="set-log">• ${s.weight} × ${s.reps} @ ${s.time}</div>`
        ).join("")}
      </div>
    `;
  });
}

render();

// ===== PWA =====
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
