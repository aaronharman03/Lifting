<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercise Tracker</title>
<style>
  body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
  h1 { text-align: center; margin-bottom: 20px; }
  .exercise-card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .input-group { margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
  input { padding: 5px; border-radius: 5px; border: 1px solid #ccc; width: 100px; }
  button { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; }
  .sets { display: flex; gap: 10px; margin-bottom: 10px; }
  .set { display: flex; align-items: center; gap: 5px; }
  .progress-bar-container { width: 100%; background: #eee; border-radius: 5px; height: 20px; margin-bottom: 5px; }
  .progress-bar { height: 100%; background: #4caf50; border-radius: 5px 0 0 5px; width: 0%; }
</style>
</head>
<body>

<h1>Exercise Tracker</h1>

<div class="input-group">
  <input type="text" id="exerciseName" placeholder="Exercise Name">
  <input type="number" id="startWeight" placeholder="Start Weight">
  <input type="number" id="goalWeight" placeholder="Goal Weight">
  <input type="number" id="repMin" placeholder="Rep Min">
  <input type="number" id="repMax" placeholder="Rep Max">
  <input type="number" id="weightIncrement" placeholder="Weight Increment">
  <input type="number" id="set1" placeholder="Set 1 reps">
  <input type="number" id="set2" placeholder="Set 2 reps">
  <input type="number" id="set3" placeholder="Set 3 reps">
  <button onclick="addExercise()">Add Exercise</button>
</div>

<div id="exerciseList"></div>

<script>
let exercises = [];

// --- Helper Functions ---
function calculateRepPoints(sets, repRange) {
  return sets.reduce((acc, reps) => acc + (reps - repRange.min), 0);
}

function calculateProgress(ex) {
  const { startWeight, currentWeight, goalWeight, repRange, weightIncrement, sets } = ex;
  const maxRepPoints = (repRange.max - repRange.min) * 3;
  const repPoints = calculateRepPoints(sets, repRange);
  const weightIncrements = Math.floor((currentWeight - startWeight) / weightIncrement);
  const weightPoints = weightIncrements * 3 * maxRepPoints;
  const totalWeightIncrements = Math.floor((goalWeight - startWeight) / weightIncrement);
  const totalPoints = totalWeightIncrements * 3 * maxRepPoints + maxRepPoints;
  return Math.min(((repPoints + weightPoints) / totalPoints) * 100, 100);
}

function renderExercises() {
  const container = document.getElementById('exerciseList');
  container.innerHTML = '';

  exercises.forEach((ex, idx) => {
    const card = document.createElement('div');
    card.className = 'exercise-card';

    const title = document.createElement('h2');
    title.textContent = ex.name;
    card.appendChild(title);

    // Weight controls
    const weightDiv = document.createElement('div');
    weightDiv.className = 'input-group';
    const minusWeight = document.createElement('button');
    minusWeight.textContent = `-${ex.weightIncrement}kg`;
    minusWeight.onclick = () => changeWeight(idx, -ex.weightIncrement);
    const plusWeight = document.createElement('button');
    plusWeight.textContent = `+${ex.weightIncrement}kg`;
    plusWeight.onclick = () => changeWeight(idx, ex.weightIncrement);
    const weightText = document.createElement('span');
    weightText.textContent = `${ex.currentWeight} kg (Goal: ${ex.goalWeight} kg)`;
    weightDiv.appendChild(minusWeight);
    weightDiv.appendChild(weightText);
    weightDiv.appendChild(plusWeight);
    card.appendChild(weightDiv);

    // Sets
    const setsDiv = document.createElement('div');
    setsDiv.className = 'sets';
    ex.sets.forEach((reps, sIdx) => {
      const setDiv = document.createElement('div');
      setDiv.className = 'set';
      const minusBtn = document.createElement('button');
      minusBtn.textContent = '-';
      minusBtn.onclick = () => changeReps(idx, sIdx, -1);
      const plusBtn = document.createElement('button');
      plusBtn.textContent = '+';
      plusBtn.onclick = () => changeReps(idx, sIdx, 1);
      const setText = document.createElement('span');
      setText.textContent = `Set ${sIdx+1}: ${reps} reps`;
      setDiv.appendChild(minusBtn);
      setDiv.appendChild(setText);
      setDiv.appendChild(plusBtn);
      setsDiv.appendChild(setDiv);
    });
    card.appendChild(setsDiv);

    // Progress bar
    const progress = calculateProgress(ex).toFixed(1);
    const progressContainer = document.createElement('div');
    progressContainer.className = 'progress-bar-container';
    const progressBar = document.createElement('div');
    progressBar.className = 'progress-bar';
    progressBar.style.width = `${progress}%`;
    progressContainer.appendChild(progressBar);
    card.appendChild(progressContainer);

    const progressText = document.createElement('span');
    progressText.textContent = `${progress}%`;
    card.appendChild(progressText);

    container.appendChild(card);
  });
}

// --- Event Functions ---
function addExercise() {
  const name = document.getElementById('exerciseName').value;
  const startWeight = parseFloat(document.getElementById('startWeight').value);
  const goalWeight = parseFloat(document.getElementById('goalWeight').value);
  const repMin = parseInt(document.getElementById('repMin').value);
  const repMax = parseInt(document.getElementById('repMax').value);
  const weightIncrement = parseFloat(document.getElementById('weightIncrement').value);
  const set1 = parseInt(document.getElementById('set1').value);
  const set2 = parseInt(document.getElementById('set2').value);
  const set3 = parseInt(document.getElementById('set3').value);

  if (!name || isNaN(startWeight) || isNaN(goalWeight) || isNaN(repMin) || isNaN(repMax) || isNaN(weightIncrement) || isNaN(set1) || isNaN(set2) || isNaN(set3)) {
    alert('Please fill all fields correctly.');
    return;
  }

  exercises.push({
    name,
    startWeight,
    currentWeight: startWeight,
    goalWeight,
    repRange: { min: repMin, max: repMax },
    weightIncrement,
    sets: [set1,set2,set3]
  });

  renderExercises();
}

// --- Change reps/weight ---
function changeReps(exIdx, setIdx, delta) {
  const ex = exercises[exIdx];
  ex.sets[setIdx] = Math.min(Math.max(ex.sets[setIdx] + delta, ex.repRange.min), ex.repRange.max);
  renderExercises();
}

function changeWeight(exIdx, delta) {
  const ex = exercises[exIdx];
  ex.currentWeight = Math.min(Math.max(ex.currentWeight + delta, ex.startWeight), ex.goalWeight);
  renderExercises();
}

</script>
</body>
</html>
