<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercise Tracker</title>
<style>
  body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
  h1 { text-align: center; margin-bottom: 20px; }

  .add-exercise { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .add-exercise input { padding: 5px; border-radius: 5px; border: 1px solid #ccc; width: 120px; }
  .add-exercise button { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; }

  .exercise-card { background: white; padding: 15px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .exercise-card h2 { margin-top: 0; }
  .fields { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .fields input { width: 100px; padding: 5px; border-radius: 5px; border: 1px solid #ccc; }

  .progress-container { width: 100%; background: #eee; border-radius: 5px; height: 20px; margin-bottom: 5px; }
  .progress-bar { height: 100%; background: #4caf50; border-radius: 5px 0 0 5px; width: 0%; transition: width 0.2s; }
</style>
</head>
<body>

<h1>Exercise Tracker</h1>

<div class="add-exercise">
  <input type="text" id="exerciseName" placeholder="Exercise Name">
  <input type="number" id="startWeight" placeholder="Start Weight">
  <input type="number" id="currentWeight" placeholder="Current Weight">
  <input type="number" id="goalWeight" placeholder="Goal Weight">
  <input type="number" id="repMin" placeholder="Rep Min">
  <input type="number" id="repMax" placeholder="Rep Max">
  <input type="number" id="weightIncrement" placeholder="Weight Increment">
  <input type="number" id="set1" placeholder="Set 1 reps">
  <input type="number" id="set2" placeholder="Set 2 reps">
  <input type="number" id="set3" placeholder="Set 3 reps">
  <button onclick="addExercise()">Add Exercise</button>
</div>

<div id="exerciseList"></div>

<script>
let exercises = [];

// --- Correct stepwise progress calculation ---
function calculateProgress(ex) {
  const { startWeight, currentWeight, goalWeight, repRange, weightIncrement, sets } = ex;

  const setsCount = sets.length;
  const repMin = repRange.min;
  const repMax = repRange.max;

  // Max rep units per weight
  const maxRepUnitsPerWeight = (repMax - repMin) * setsCount;

  // Total weight increments to reach goal
  const totalWeightIncrements = Math.floor((goalWeight - startWeight) / weightIncrement);

  // Units from current reps at current weight
  const currentRepUnits = sets.reduce((acc, reps) => acc + (reps - repMin), 0);

  // Units from completed weight increments (all sets must have reached rep goal at previous weights)
  const weightIncrementsAchieved = Math.floor((currentWeight - startWeight) / weightIncrement);
  const weightUnits = weightIncrementsAchieved * maxRepUnitsPerWeight * 3; // weight increment worth 3×

  // Total units to reach goal
  const totalUnits = (totalWeightIncrements * maxRepUnitsPerWeight * 3) + maxRepUnitsPerWeight;

  // Total units achieved
  const completedUnits = weightUnits + currentRepUnits;

  // Progress %
  return Math.min((completedUnits / totalUnits) * 100, 100);
}

// --- Create Exercise Card ---
function createExerciseCard(ex) {
  const card = document.createElement('div');
  card.className = 'exercise-card';

  const title = document.createElement('h2');
  title.textContent = ex.name;
  card.appendChild(title);

  const fieldsDiv = document.createElement('div');
  fieldsDiv.className = 'fields';
  const fieldMap = [
    { label: 'Name', key: 'name' },
    { label: 'Start', key: 'startWeight' },
    { label: 'Current', key: 'currentWeight' },
    { label: 'Goal', key: 'goalWeight' },
    { label: 'Rep Min', key: 'repMin' },
    { label: 'Rep Max', key: 'repMax' },
    { label: 'Increment', key: 'weightIncrement' },
    { label: 'Set 1', key: 'set1' },
    { label: 'Set 2', key: 'set2' },
    { label: 'Set 3', key: 'set3' }
  ];

  fieldMap.forEach(f => {
    const input = document.createElement('input');
    if(f.key.startsWith('set')) {
      input.value = ex.sets[parseInt(f.key[3])-1];
    } else if(f.key==='repMin' || f.key==='repMax') {
      input.value = ex.repRange[f.key==='repMin'?'min':'max'];
    } else if(f.key==='name') {
      input.value = ex.name;
    } else {
      input.value = ex[f.key];
    }
    input.placeholder = f.label;

    input.oninput = () => {
      if(f.key.startsWith('set')) {
        ex.sets[parseInt(f.key[3])-1] = parseInt(input.value) || ex.repRange.min;
      } else if(f.key==='repMin' || f.key==='repMax') {
        ex.repRange[f.key==='repMin'?'min':'max'] = parseInt(input.value) || 0;
      } else if(f.key==='name') {
        ex.name = input.value;
        title.textContent = ex.name;
      } else {
        ex[f.key] = parseFloat(input.value) || 0;
      }
      progressBar.style.width = calculateProgress(ex) + '%';
      progressText.textContent = calculateProgress(ex).toFixed(1) + '%';
    };

    fieldsDiv.appendChild(input);
  });

  card.appendChild(fieldsDiv);

  const progressContainer = document.createElement('div');
  progressContainer.className = 'progress-container';
  const progressBar = document.createElement('div');
  progressBar.className = 'progress-bar';
  progressBar.style.width = calculateProgress(ex) + '%';
  progressContainer.appendChild(progressBar);
  card.appendChild(progressContainer);

  const progressText = document.createElement('span');
  progressText.textContent = calculateProgress(ex).toFixed(1) + '%';
  card.appendChild(progressText);

  return card;
}

// --- Render all exercises ---
function renderExercises() {
  const container = document.getElementById('exerciseList');
  container.innerHTML = '';
  exercises.forEach(ex => {
    container.appendChild(createExerciseCard(ex));
  });
}

// --- Add Exercise ---
function addExercise() {
  const name = document.getElementById('exerciseName').value;
  const startWeight = parseFloat(document.getElementById('startWeight').value);
  const currentWeight = parseFloat(document.getElementById('currentWeight').value);
  const goalWeight = parseFloat(document.getElementById('goalWeight').value);
  const repMin = parseInt(document.getElementById('repMin').value);
  const repMax = parseInt(document.getElementById('repMax').value);
  const weightIncrement = parseFloat(document.getElementById('weightIncrement').value);
  const set1 = parseInt(document.getElementById('set1').value);
  const set2 = parseInt(document.getElementById('set2').value);
  const set3 = parseInt(document.getElementById('set3').value);

  if(!name || isNaN(startWeight) || isNaN(currentWeight) || isNaN(goalWeight) || isNaN(repMin) || isNaN(repMax) || isNaN(weightIncrement) || isNaN(set1) || isNaN(set2) || isNaN(set3)) {
    alert('Please fill all fields correctly.');
    return;
  }

  const exercise = {
    name,
    startWeight,
    currentWeight,
    goalWeight,
    repRange: { min: repMin, max: repMax },
    weightIncrement,
    sets: [set1,set2,set3]
  };
  exercises.push(exercise);
  renderExercises();
}
</script>

</body>
</html>
