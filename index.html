<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise Tracker PWA</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f2f5;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .exercise-card {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .weight-controls, .sets {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .set {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 5px;
    }
    button {
      padding: 5px 10px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }
    .progress-bar-container {
      width: 100%;
      background: #eee;
      border-radius: 5px;
      height: 20px;
      margin-bottom: 5px;
    }
    .progress-bar {
      height: 100%;
      background: #4caf50;
      border-radius: 5px 0 0 5px;
      width: 0%;
    }
  </style>
</head>
<body>

  <h1>Exercise Tracker PWA</h1>
  <div id="exercise-list"></div>

  <script>
    // --- Exercise Data ---
    const exercises = [
      {
        id: 1,
        name: "Bench Press",
        startWeight: 20,
        currentWeight: 20,
        goalWeight: 50,
        repRange: { min: 6, max: 12 },
        weightIncrement: 5,
        sets: [6,6,6],
      },
      {
        id: 2,
        name: "Squat",
        startWeight: 30,
        currentWeight: 30,
        goalWeight: 80,
        repRange: { min: 6, max: 12 },
        weightIncrement: 5,
        sets: [6,6,6],
      }
    ];

    // --- Helper Functions ---
    function calculateRepPoints(sets, repRange) {
      return sets.reduce((acc, reps) => acc + (reps - repRange.min), 0);
    }

    function calculateProgress(ex) {
      const { startWeight, currentWeight, goalWeight, repRange, weightIncrement, sets } = ex;
      const maxRepPoints = (repRange.max - repRange.min) * 3;
      const repPoints = calculateRepPoints(sets, repRange);
      const weightIncrementsAchieved = Math.floor((currentWeight - startWeight) / weightIncrement);
      const weightPoints = weightIncrementsAchieved * 3 * maxRepPoints;
      const totalWeightIncrements = Math.floor((goalWeight - startWeight) / weightIncrement);
      const totalPoints = totalWeightIncrements * 3 * maxRepPoints + maxRepPoints;
      return Math.min(((repPoints + weightPoints) / totalPoints) * 100, 100);
    }

    // --- Render Exercises ---
    const exerciseList = document.getElementById("exercise-list");

    function renderExercises() {
      exerciseList.innerHTML = '';
      exercises.forEach(ex => {
        const card = document.createElement("div");
        card.className = "exercise-card";

        const title = document.createElement("h2");
        title.textContent = ex.name;
        card.appendChild(title);

        // Weight controls
        const weightControls = document.createElement("div");
        weightControls.className = "weight-controls";
        const minusWeight = document.createElement("button");
        minusWeight.textContent = `-${ex.weightIncrement}kg`;
        minusWeight.onclick = () => changeWeight(ex.id, -ex.weightIncrement);
        const plusWeight = document.createElement("button");
        plusWeight.textContent = `+${ex.weightIncrement}kg`;
        plusWeight.onclick = () => changeWeight(ex.id, ex.weightIncrement);
        const weightText = document.createElement("span");
        weightText.textContent = `${ex.currentWeight} kg (Goal: ${ex.goalWeight} kg)`;
        weightControls.appendChild(minusWeight);
        weightControls.appendChild(weightText);
        weightControls.appendChild(plusWeight);
        card.appendChild(weightControls);

        // Sets
        const setsDiv = document.createElement("div");
        setsDiv.className = "sets";
        ex.sets.forEach((reps, idx) => {
          const setDiv = document.createElement("div");
          setDiv.className = "set";
          const minusBtn = document.createElement("button");
          minusBtn.textContent = "-";
          minusBtn.onclick = () => changeReps(ex.id, idx, -1);
          const plusBtn = document.createElement("button");
          plusBtn.textContent = "+";
          plusBtn.onclick = () => changeReps(ex.id, idx, 1);
          const setText = document.createElement("span");
          setText.textContent = `Set ${idx + 1}: ${reps} reps`;
          setDiv.appendChild(minusBtn);
          setDiv.appendChild(setText);
          setDiv.appendChild(plusBtn);
          setsDiv.appendChild(setDiv);
        });
        card.appendChild(setsDiv);

        // Progress bar
        const progress = calculateProgress(ex).toFixed(1);
        const progressContainer = document.createElement("div");
        progressContainer.className = "progress-bar-container";
        const progressBar = document.createElement("div");
        progressBar.className = "progress-bar";
        progressBar.style.width = `${progress}%`;
        progressContainer.appendChild(progressBar);
        card.appendChild(progressContainer);

        const progressText = document.createElement("span");
        progressText.textContent = `${progress}%`;
        card.appendChild(progressText);

        exerciseList.appendChild(card);
      });
    }

    function changeReps(exId, setIndex, delta) {
      const ex = exercises.find(e => e.id === exId);
      ex.sets[setIndex] = Math.min(Math.max(ex.sets[setIndex] + delta, ex.repRange.min), ex.repRange.max);
      renderExercises();
    }

    function changeWeight(exId, delta) {
      const ex = exercises.find(e => e.id === exId);
      ex.currentWeight = Math.min(Math.max(ex.currentWeight + delta, ex.startWeight), ex.goalWeight);
      renderExercises();
    }

    renderExercises();
  </script>
</body>
</html>
